spring:
  application:
    name: shopping-cart-service
  
  # Enable Java 21 Project Loom Virtual Threads for highly scalable, low-overhead concurrency
  threads:
    virtual:
      enabled: true

  # Default/Local Dev Profile using in-memory H2 database
  datasource:
    url: jdbc:h2:mem:cartdb;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Manage standard actuators and Prometheus scraping
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always

server:
  port: 8080

---
# Docker/Production Profile linking with PostgreSQL container
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://db:5432/cart_db
    username: abysalto_user
    password: abysalto_secure_password
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
