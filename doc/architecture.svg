<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="100%" height="100%" style="background-color: #0f172a; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="grad-channels" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="grad-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#c084fc" />
    </marker>
  </defs>

  <!-- Title & Metadata -->
  <text x="480" y="35" text-anchor="middle" fill="#38bdf8" font-size="22" font-weight="800" letter-spacing="1">ABYSALTO WEBSHOP</text>
  <text x="480" y="55" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500">HIGH-LEVEL SYSTEM ARCHITECTURE</text>

  <!-- ==================== LAYER 1: SALES CHANNELS ==================== -->
  <rect x="30" y="80" width="900" height="90" rx="12" fill="none" stroke="#334155" stroke-dasharray="6,4" />
  <text x="50" y="105" fill="#64748b" font-size="11" font-weight="700" letter-spacing="0.5">SALES CHANNELS (FRONTEND)</text>

  <!-- Web Shop -->
  <g transform="translate(100, 110)">
    <rect width="200" height="50" rx="8" fill="url(#grad-channels)" stroke="#38bdf8" stroke-width="1.5" />
    <text x="100" y="30" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="600">🌍 Web Shop (Next.js)</text>
  </g>

  <!-- Mobile App -->
  <g transform="translate(380, 110)">
    <rect width="200" height="50" rx="8" fill="url(#grad-channels)" stroke="#38bdf8" stroke-width="1.5" />
    <text x="100" y="30" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="600">📱 Mobile App (Hybrid)</text>
  </g>

  <!-- B2B / EDI Gateway -->
  <g transform="translate(660, 110)">
    <rect width="200" height="50" rx="8" fill="url(#grad-channels)" stroke="#38bdf8" stroke-width="1.5" />
    <text x="100" y="30" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="600">🔗 B2B / EDI Gateway</text>
  </g>

  <!-- ==================== LAYER 2: SECURITY & EDGE ==================== -->
  <rect x="30" y="190" width="900" height="90" rx="12" fill="none" stroke="#334155" stroke-dasharray="6,4" />
  <text x="50" y="215" fill="#64748b" font-size="11" font-weight="700" letter-spacing="0.5">SECURITY, WAF &amp; API GATEWAY LAYER</text>

  <!-- Cloud Armor -->
  <g transform="translate(210, 220)">
    <rect width="240" height="50" rx="8" fill="url(#grad-edge)" stroke="#f43f5e" stroke-width="2" />
    <text x="120" y="29" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700" letter-spacing="0.5">🛡️ GCP Cloud Armor (WAF)</text>
  </g>

  <!-- Apigee API Gateway -->
  <g transform="translate(510, 220)">
    <rect width="240" height="50" rx="8" fill="url(#grad-edge)" stroke="#f43f5e" stroke-width="2" />
    <text x="120" y="29" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700" letter-spacing="0.5">🔑 Apigee API Gateway</text>
  </g>

  <!-- ==================== LAYER 3: BUSINESS LOGIC ==================== -->
  <rect x="30" y="300" width="900" height="110" rx="12" fill="none" stroke="#334155" stroke-dasharray="6,4" />
  <text x="50" y="325" fill="#64748b" font-size="11" font-weight="700" letter-spacing="0.5">API &amp; BUSINESS LOGIC LAYER (GKE CLUSTER)</text>

  <!-- Catalog Service -->
  <g transform="translate(60, 340)">
    <rect width="180" height="55" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="90" y="28" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">📦 Catalog Service</text>
    <text x="90" y="44" text-anchor="middle" fill="#64748b" font-size="10">Product Discovery</text>
  </g>

  <!-- Order Service -->
  <g transform="translate(280, 340)">
    <rect width="180" height="55" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="90" y="28" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">🛒 Order &amp; Checkout</text>
    <text x="90" y="44" text-anchor="middle" fill="#64748b" font-size="10">Pricing &amp; Checkout</text>
  </g>

  <!-- User Service -->
  <g transform="translate(500, 340)">
    <rect width="180" height="55" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="90" y="28" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">👤 User &amp; Profile</text>
    <text x="90" y="44" text-anchor="middle" fill="#64748b" font-size="10">Auth &amp; Customer Data</text>
  </g>

  <!-- Payment Service -->
  <g transform="translate(720, 340)">
    <rect width="180" height="55" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="90" y="28" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">💳 Payment Service</text>
    <text x="90" y="44" text-anchor="middle" fill="#64748b" font-size="10">Stripe/Adyen Integration</text>
  </g>

  <!-- ==================== LAYER 4: EVENT MESH & DATA STORAGE ==================== -->
  <rect x="30" y="430" width="900" height="150" rx="12" fill="none" stroke="#334155" stroke-dasharray="6,4" />
  <text x="50" y="455" fill="#64748b" font-size="11" font-weight="700" letter-spacing="0.5">DATA STORAGE &amp; EVENT MESSAGING MESH</text>

  <!-- Redis Cache -->
  <g transform="translate(60, 480)">
    <rect width="180" height="60" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" />
    <text x="90" y="30" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">⚡ Memorystore Redis</text>
    <text x="90" y="46" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="500">Catalog Cache &amp; Sessions</text>
  </g>

  <!-- GCP Pub/Sub -->
  <g transform="translate(280, 480)">
    <rect width="180" height="60" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" />
    <text x="90" y="30" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">📨 GCP Pub/Sub</text>
    <text x="90" y="46" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="500">Event-Driven Broker</text>
  </g>

  <!-- PgBouncer -->
  <g transform="translate(500, 480)">
    <rect width="180" height="60" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1" />
    <text x="90" y="30" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">🔄 PgBouncer Pooler</text>
    <text x="90" y="46" text-anchor="middle" fill="#94a3b8" font-size="10">Connection Pooling</text>
  </g>

  <!-- PostgreSQL HA -->
  <g transform="translate(720, 480)">
    <rect width="180" height="60" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2" />
    <text x="90" y="30" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="700">💾 Cloud SQL Postgres HA</text>
    <text x="90" y="46" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="500">Transactional Database</text>
  </g>

  <!-- ==================== CONNECTING LINES (ARROWS) ==================== -->
  
  <!-- Channels to Armor -->
  <path d="M 200 160 L 200 175 L 330 175 L 330 220" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 480 160 L 480 175 L 330 175 L 330 220" fill="none" stroke="#38bdf8" stroke-width="1.5" />
  <path d="M 760 160 L 760 175 L 330 175 L 330 220" fill="none" stroke="#38bdf8" stroke-width="1.5" />

  <!-- Armor to Apigee -->
  <path d="M 450 245 L 510 245" fill="none" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Apigee to GKE Services -->
  <path d="M 630 270 L 630 285 L 150 285 L 150 340" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 630 285 L 370 285 L 370 340" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 630 285 L 590 285 L 590 340" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 630 285 L 810 285 L 810 340" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Catalog to Redis -->
  <path d="M 150 395 L 150 480" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Order & Catalog to Pub/Sub -->
  <path d="M 170 395 L 170 415 L 330 415 L 330 480" fill="none" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" />
  <path d="M 370 395 L 370 480" fill="none" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrow-purple)" />

  <!-- Services to PgBouncer -->
  <path d="M 370 395 L 370 420 L 590 420 L 590 480" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 590 395 L 590 480" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 810 395 L 810 420 L 590 420 L 590 480" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- PgBouncer to PostgreSQL HA -->
  <path d="M 680 510 L 720 510" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)" />

</svg>
